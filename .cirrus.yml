task:
  name: Build KeepQASSA ROM
  timeout_in: 120m
  container:
    image: inok2341/anu:latest
    cpu: 8
    memory: 32G
    greedy: true

  # 1. Install required tools
  install_script:
    - sudo apt-get update && sudo apt-get install -y rclone git-lfs python3
    - pwd
    - ls -la

  # 2. Setup environment credentials and initialize Repo
  setup_stage_script:
    - python3 build_rom.py setup

  # 3. Sync the main source code
  sync_stage_script:
    - python3 build_rom.py sync

  # 4. Clone X00TD device specific trees
  clone_stage_script:
    - python3 build_rom.py clone

  # 5. Start the core compilation process
  build_stage_script:
    - python3 build_rom.py build

  # 6. Check MD5 and upload compiled ROM to Google Drive
  upload_stage_script:
    - python3 build_rom.py upload
