task:
  name: Build LineageOS ROM
  timeout_in: 120m
  container:
    image: inok2341/anu:latest
    cpu: 8
    memory: 32G

  # 1. Menginstal alat yang dibutuhkan
  install_script:
    - sudo apt-get update && sudo apt-get install -y rclone git-lfs python3
    - pwd
    - ls -la

  # 2. Menyiapkan kredensial dan inisialisasi Repo
  tahap_setup:
    - python3 build_rom.py setup

  # 3. Mengunduh miliaran baris kode sumber utama
  tahap_sync:
    - python3 build_rom.py sync

  # 4. Mengkloning spesifikasi perangkat X00TD
  tahap_clone:
    - python3 build_rom.py clone

  # 5. Memulai proses kompilasi inti
  tahap_build:
    - python3 build_rom.py build

  # 6. Mengunggah ROM hasil kompilasi ke Google Drive
  tahap_upload:
    - python3 build_rom.py upload
